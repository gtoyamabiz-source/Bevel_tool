<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>配管開先精密加工図面作成 (片側仕様)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* スマホ向け高感度スライダー設定 */
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 26px; height: 26px; border-radius: 9999px;
      background: #2563eb; cursor: pointer; border: 3px solid #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); margin-top: -8px;
    }
    input[type="range"]::-moz-range-thumb {
      width: 26px; height: 26px; border-radius: 9999px;
      background: #2563eb; cursor: pointer; border: 3px solid #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%; height: 10px; background: #cbd5e1; border-radius: 9999px;
    }
    input[type="range"]:active::-webkit-slider-thumb {
      background: #1d4ed8; transform: scale(1.15); transition: transform 0.05s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col max-w-md mx-auto shadow-2xl relative pb-12">

  <!-- --- ヘッダー --- -->
  <header class="bg-slate-950 text-white px-4 py-3 flex items-center justify-between shrink-0 z-30 shadow-md">
    <div class="flex items-center space-x-2">
      <svg class="text-blue-500 w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="2" y1="14" x2="6" y2="14"></line><line x1="10" y1="8" x2="14" y2="8"></line><line x1="18" y1="16" x2="22" y2="16"></line></svg>
      <h1 class="text-xs font-black tracking-wider">配管開先精密加工図面 (片側)</h1>
    </div>
    <button id="btn-reset" class="p-1.5 bg-slate-800 rounded-full hover:bg-slate-700 transition active:scale-95" title="初期設定に戻す">
      <svg class="text-white w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
    </button>
  </header>

  <!-- --- 図面エリア (Sticky上部固定) --- -->
  <div class="sticky top-0 bg-white border-b border-slate-200 z-20 shadow-md shrink-0 select-none">
    <div id="error-overlay" class="absolute inset-0 bg-red-50/95 flex flex-col items-center justify-center p-4 z-20 text-center hidden">
      <span class="text-red-500 font-bold mb-1">⚠️ 図面を生成できません</span>
      <span id="error-message" class="text-xs text-red-700 font-semibold"></span>
    </div>

    <div class="w-full aspect-[600/340] bg-slate-50 flex items-center justify-center">
      <svg id="drawing-svg" width="100%" height="100%" viewBox="0 0 600 340" class="block">
        <defs>
          <pattern id="hatch-beveled" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="10" stroke="#cbd5e1" stroke-width="1" />
          </pattern>
          <marker id="arrow-end" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a" />
          </marker>
          <marker id="arrow-start" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 10 0 L 0 5 L 10 10 z" fill="#0f172a" />
          </marker>
        </defs>
        <!-- A4外枠 -->
        <rect x="8" y="8" width="584" height="324" fill="none" stroke="#475569" stroke-width="1" rx="2" />
        <rect x="11" y="11" width="578" height="318" fill="none" stroke="#f1f5f9" stroke-width="0.5" rx="1" />
        
        <!-- コンテンツ描画コンテナ -->
        <g id="svg-content"></g>
      </svg>
    </div>
  </div>

  <!-- --- ステータスバー --- -->
  <div class="bg-slate-900 text-slate-300 px-4 py-2 flex justify-between items-center text-xs shrink-0 select-none">
    <span id="status-shape-name" class="font-extrabold text-white bg-blue-600 px-2.5 py-0.5 rounded-full text-[10px]">
      開先種別: V二段開先
    </span>
    <span class="text-[10px] text-slate-400 font-bold">下部をスクロールして調整できます</span>
  </div>

  <!-- --- コントロールパネル (縦並びスクロール式・アコーディオン) --- -->
  <div class="flex-1 flex flex-col bg-slate-150 p-3 space-y-3">

    <!-- ①開先基本形状の選択 -->
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
      <button onclick="toggleSection('sec-shape', 'icon-shape')" class="w-full px-4 py-3 bg-slate-50 border-b flex justify-between items-center text-xs font-black text-slate-700">
        <div class="flex items-center space-x-2">
          <svg class="text-blue-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
          <span>① 開先基本形状の選択</span>
        </div>
        <span class="text-blue-600 font-bold flex items-center space-x-1">
          <span id="selected-shape-lbl" class="text-xs">V二段開先</span>
          <svg id="icon-shape" class="w-4 h-4 transition-transform duration-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </span>
      </button>
      <div id="sec-shape" class="p-3 grid grid-cols-3 gap-2 bg-white animate-fade-in hidden">
        <button onclick="changeShape('V')" id="btn-shape-V" class="btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border">V形</button>
        <button onclick="changeShape('V2')" id="btn-shape-V2" class="btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border">V二段</button>
        <button onclick="changeShape('V3')" id="btn-shape-V3" class="btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border">V三段</button>
        <button onclick="changeShape('U')" id="btn-shape-U" class="btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border">U形</button>
        <button onclick="changeShape('U2')" id="btn-shape-U2" class="btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border">U二段</button>
      </div>
    </div>

    <!-- ②基本設計寸法の調整 -->
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
      <button onclick="toggleSection('sec-basic', 'icon-basic')" class="w-full px-4 py-3 bg-slate-50 border-b flex justify-between items-center text-xs font-black text-slate-700">
        <div class="flex items-center space-x-2">
          <svg class="text-blue-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="2" y1="14" x2="6" y2="14"></line><line x1="10" y1="8" x2="14" y2="8"></line><line x1="18" y1="16" x2="22" y2="16"></line></svg>
          <span>② 基本設計寸法の調整</span>
        </div>
        <svg id="icon-basic" class="w-4 h-4 text-slate-400 transition-transform duration-200" style="transform: rotate(180deg);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </button>
      <div id="sec-basic" class="p-3 space-y-3 bg-white border-t animate-fade-in">
        <div id="field-t"></div>
        <div id="field-f"></div>
        <div id="field-a1"></div>
      </div>
    </div>

    <!-- ③多段開先・R加工の調整 -->
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
      <button onclick="toggleSection('sec-advanced', 'icon-advanced')" class="w-full px-4 py-3 bg-slate-50 border-b flex justify-between items-center text-xs font-black text-slate-700">
        <div class="flex items-center space-x-2">
          <svg class="text-blue-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          <span>③ 多段開先・R加工の調整</span>
        </div>
        <svg id="icon-advanced" class="w-4 h-4 text-slate-400 transition-transform duration-200" style="transform: rotate(180deg);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </button>
      <div id="sec-advanced" class="p-3 space-y-3 bg-white border-t animate-fade-in">
        <div id="field-r"></div>
        <div id="field-h1"></div>
        <div id="field-a2"></div>
        <div id="field-h2"></div>
        <div id="field-a3"></div>
        <div id="field-rj"></div>
        <div id="no-advanced-msg" class="p-6 text-center text-xs font-semibold text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200 hidden">
          標準1段開先には追加設定項目はありません
        </div>
      </div>
    </div>

  </div>

  <!-- --- JavaScript Logic --- -->
  <script>
    const formatNumber = (numStr) => {
      if (numStr === null || numStr === undefined || numStr === '') return '';
      const n = parseFloat(numStr);
      if (isNaN(n)) return '';
      let s = n.toFixed(2);
      s = s.replace(/\.00$/, '');
      if (s.includes('.')) s = s.replace(/0$/, '');
      return s;
    };

    const rad = (deg) => (deg * Math.PI) / 180;

    // --- 初期状態設定 (V2, t=25.0) ---
    const initialParams = {
      shape: 'V2',
      t: { val: '25.0', tp: '', tm: '' },
      f: { val: '1.5', tp: '1.0', tm: '1.0' },
      a1: { val: '37.5', tp: '2.5', tm: '2.5' },
      a2: { val: '10.0', tp: '2.5', tm: '2.5' },
      a3: { val: '5.0', tp: '2.5', tm: '2.5' },
      h1: { val: '19.0', tp: '1.0', tm: '1.0' },
      h2: { val: '25.0', tp: '1.0', tm: '1.0' },
      r: { val: '3.0', tp: '0.5', tm: '0.5' },
      rj: { val: '3.0', tp: '0.5', tm: '0.5' }
    };

    let state = JSON.parse(JSON.stringify(initialParams));
    let tempState = JSON.parse(JSON.stringify(initialParams));

    const shapeNames = {
      'V': 'V形開先', 'V2': 'V二段開先', 'V3': 'V三段開先', 'U': 'U形開先', 'U2': 'U二段開先'
    };

    function getLimits(t, f, h1) {
      return {
        t: { min: 1, max: 200, step: 0.1 },
        f: { min: 0.1, max: Math.max(0.1, t - 0.5), step: 0.1 },
        h1: { min: 0.5, max: 200, step: 0.5 },
        h2: { min: 0.5, max: 200, step: 0.5 },
        a1: { min: 0, max: 80, step: 0.5 },
        a2: { min: 0, max: 80, step: 0.5 },
        a3: { min: 0, max: 80, step: 0.5 },
        r: { min: 0.5, max: Math.max(1, t - 0.5), step: 0.5 },
        rj: { min: 0.5, max: 20, step: 0.5 }
      };
    }

    function normalizeLimits() {
      const t = parseFloat(state.t.val) || 20;
      const f = parseFloat(state.f.val) || 1.5;
      let needsUpdate = false;
      if (f >= t) {
        state.f.val = (t / 5).toFixed(1);
        needsUpdate = true;
      }
      if (needsUpdate) tempState = JSON.parse(JSON.stringify(state));
    }

    function toggleSection(secId, iconId) {
      const el = document.getElementById(secId);
      const icon = document.getElementById(iconId);
      if (el.classList.contains('hidden')) {
        el.classList.remove('hidden');
        icon.style.transform = 'rotate(180deg)';
      } else {
        el.classList.add('hidden');
        icon.style.transform = 'rotate(0deg)';
      }
    }

    function changeShape(shapeKey) {
      state.shape = shapeKey;
      tempState.shape = shapeKey;
      
      document.querySelectorAll('.btn-shape').forEach(btn => {
        btn.className = "btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border bg-slate-50 text-slate-600 border-slate-200";
      });
      const activeBtn = document.getElementById(`btn-shape-${shapeKey}`);
      if (activeBtn) activeBtn.className = "btn-shape py-2 rounded-lg text-xs font-bold transition-all duration-150 active:scale-95 text-center border bg-blue-600 text-white shadow-md border-blue-600";

      document.getElementById('status-shape-name').innerText = `開先種別: ${shapeNames[shapeKey]}`;
      document.getElementById('selected-shape-lbl').innerText = shapeNames[shapeKey];
      
      normalizeLimits(); renderControls(); draw();
    }

    function draw() {
      const errOverlay = document.getElementById('error-overlay');
      const errMessage = document.getElementById('error-message');
      const svgContent = document.getElementById('svg-content');

      const p = {
        shape: state.shape,
        t: parseFloat(state.t.val) || 0,
        f: parseFloat(state.f.val) || 0,
        a1: parseFloat(state.a1.val) || 0,
        a2: parseFloat(state.a2.val) || 0,
        a3: parseFloat(state.a3.val) || 0,
        h1: parseFloat(state.h1.val) || 0,
        h2: parseFloat(state.h2.val) || 0,
        r: parseFloat(state.r.val) || 0,
        rj: parseFloat(state.rj.val) || 0,
      };

      if (p.t <= 0) {
        errOverlay.classList.remove('hidden'); errMessage.innerText = "配管肉厚は0より大きくしてください。"; return;
      }
      if (p.f >= p.t) {
        errOverlay.classList.remove('hidden'); errMessage.innerText = "ルート面高さは肉厚より小さくしてください。"; return;
      }
      errOverlay.classList.add('hidden');

      let profile = [{ x: 0, y: 0 }, { x: 0, y: p.f }];
      let stepsForDim = [];
      let joints = [];

      let cx = 0; let cy = p.f;

      if (p.shape === 'V') {
        let x1 = cx + (p.t - p.f) * Math.tan(rad(p.a1));
        profile.push({ x: x1, y: p.t });
        stepsForDim.push({ startX: cx, startY: cy, endX: x1, endY: p.t, a: p.a1, aTp: state.a1.tp, aTm: state.a1.tm });
      } 
      else if (p.shape === 'V2') {
        let y1 = Math.min(p.h1, p.t);
        let x1 = cx + (y1 - cy) * Math.tan(rad(p.a1));
        
        let d = p.rj * Math.abs(Math.tan((rad(p.a1) - rad(p.a2)) / 2));
        let p1x = x1 - d * Math.sin(rad(p.a1)); let p1y = y1 - d * Math.cos(rad(p.a1));
        let p2x = x1 + d * Math.sin(rad(p.a2)); let p2y = y1 + d * Math.cos(rad(p.a2));

        profile.push({ x: p1x, y: p1y });
        profile.push({ arc: true, r: p.rj, x: p2x, y: p2y, sweep: 0 });

        stepsForDim.push({ startX: cx, startY: cy, endX: x1, endY: p.h1, h: p.h1, hStart: 0, hTp: state.h1.tp, hTm: state.h1.tm, a: p.a1, aTp: state.a1.tp, aTm: state.a1.tm });
        
        if (p.h1 < p.t) {
          joints.push({ x: x1, y: y1 });
          let x2 = x1 + (p.t - y1) * Math.tan(rad(p.a2));
          profile.push({ x: x2, y: p.t });
          stepsForDim.push({ startX: x1, startY: y1, endX: x2, endY: p.t, a: p.a2, aTp: state.a2.tp, aTm: state.a2.tm });
        }
      }
      else if (p.shape === 'V3') {
        let y1 = Math.min(p.h1, p.t);
        let x1 = cx + (y1 - cy) * Math.tan(rad(p.a1));
        
        let d1 = p.rj * Math.abs(Math.tan((rad(p.a1) - rad(p.a2)) / 2));
        profile.push({ x: x1 - d1*Math.sin(rad(p.a1)), y: y1 - d1*Math.cos(rad(p.a1)) });
        profile.push({ arc: true, r: p.rj, x: x1 + d1*Math.sin(rad(p.a2)), y: y1 + d1*Math.cos(rad(p.a2)), sweep: 0 });
        
        stepsForDim.push({ startX: cx, startY: cy, endX: x1, endY: p.h1, h: p.h1, hStart: 0, hTp: state.h1.tp, hTm: state.h1.tm, a: p.a1, aTp: state.a1.tp, aTm: state.a1.tm });
        
        if (p.h1 < p.t) {
          joints.push({ x: x1, y: y1 });
          let y2 = Math.min(p.h2, p.t);
          if (y2 > y1) {
            let x2 = x1 + (y2 - y1) * Math.tan(rad(p.a2));
            
            let d2 = p.rj * Math.abs(Math.tan((rad(p.a2) - rad(p.a3)) / 2));
            profile.push({ x: x2 - d2*Math.sin(rad(p.a2)), y: y2 - d2*Math.cos(rad(p.a2)) });
            profile.push({ arc: true, r: p.rj, x: x2 + d2*Math.sin(rad(p.a3)), y: y2 + d2*Math.cos(rad(p.a3)), sweep: 0 });

            stepsForDim.push({ startX: x1, startY: y1, endX: x2, endY: p.h2, h: p.h2, hStart: y1, hTp: state.h2.tp, hTm: state.h2.tm, a: p.a2, aTp: state.a2.tp, aTm: state.a2.tm });
            
            if (p.h2 < p.t) {
              joints.push({ x: x2, y: y2 });
              let x3 = x2 + (p.t - y2) * Math.tan(rad(p.a3));
              profile.push({ x: x3, y: p.t });
              stepsForDim.push({ startX: x2, startY: y2, endX: x3, endY: p.t, a: p.a3, aTp: state.a3.tp, aTm: state.a3.tm });
            }
          }
        }
      }
      else if (p.shape === 'U') {
        let px = p.r - p.r * Math.cos(rad(p.a1));
        let py = p.f + p.r * Math.sin(rad(p.a1));
        let cY = Math.min(py, p.t);
        profile.push({ arc: true, r: p.r, x: px, y: cY, sweep: 1 });
        
        if (py < p.t) {
          let x1 = px + (p.t - py) * Math.tan(rad(p.a1));
          profile.push({ x: x1, y: p.t });
          stepsForDim.push({ startX: px, startY: py, endX: x1, endY: p.t, a: p.a1, aTp: state.a1.tp, aTm: state.a1.tm });
        }
      }
      else if (p.shape === 'U2') {
        let px = p.r - p.r * Math.cos(rad(p.a1));
        let py = p.f + p.r * Math.sin(rad(p.a1));
        let cY = Math.min(py, p.t);
        profile.push({ arc: true, r: p.r, x: px, y: cY, sweep: 1 });
        
        if (py < p.t) {
          let y1 = Math.min(p.h1, p.t);
          let x1 = px + (y1 - py) * Math.tan(rad(p.a1));
          
          let d = p.rj * Math.abs(Math.tan((rad(p.a1) - rad(p.a2)) / 2));
          let p1x = x1 - d * Math.sin(rad(p.a1)); let p1y = y1 - d * Math.cos(rad(p.a1));
          let p2x = x1 + d * Math.sin(rad(p.a2)); let p2y = y1 + d * Math.cos(rad(p.a2));

          profile.push({ x: p1x, y: p1y });
          profile.push({ arc: true, r: p.rj, x: p2x, y: p2y, sweep: 0 });

          stepsForDim.push({ startX: px, startY: py, endX: x1, endY: p.h1, h: p.h1, hStart: 0, hTp: state.h1.tp, hTm: state.h1.tm, a: p.a1, aTp: state.a1.tp, aTm: state.a1.tm });
          
          if (p.h1 < p.t) {
            joints.push({ x: x1, y: y1 });
            let x2 = x1 + (p.t - y1) * Math.tan(rad(p.a2));
            profile.push({ x: x2, y: p.t });
            stepsForDim.push({ startX: x1, startY: y1, endX: x2, endY: p.t, a: p.a2, aTp: state.a2.tp, aTm: state.a2.tm });
          }
        }
      }

      // スケール・座標変換
      const maxX = stepsForDim.length > 0 ? stepsForDim[stepsForDim.length - 1].endX : 0;
      const pipeLength = Math.max(maxX + 45, 60);
      
      const hCount = stepsForDim.filter(s => s.h !== undefined).length;
      const stepCount = stepsForDim.length;

      // 図面全体の論理サイズ（マージン込み）
      // 左マージン(35) + 配管幅 + 右寸法線エリア(55 + hCount*22)
      const logicalWidth = 35 + pipeLength + (55 + hCount * 22); 
      
      // 角度寸法が遠くなるため、上部のスペースを大きく確保
      const maxAngleRadius = 65 + (stepCount > 0 ? stepCount - 1 : 0) * 30;
      const topSpace = Math.max(55 + stepCount * 26, maxAngleRadius + 50);
      
      // 下マージン(35) + 肉厚 + 上部スペース
      const logicalHeight = 35 + p.t + topSpace;

      const svgW = 600, svgH = 340;
      const scale = Math.min((svgW * 0.95) / logicalWidth, (svgH * 0.9) / logicalHeight, 35);

      // 中央寄せとマージンを考慮した原点(0,0)の画面座標
      const offsetX = 35 * scale + (svgW - logicalWidth * scale) / 2;
      const offsetY = svgH - 35 * scale - (svgH - logicalHeight * scale) / 2;

      const mapX = (x) => offsetX + x * scale;
      const mapY = (y) => offsetY - y * scale;

      // パス構築
      let pathD = `M ${mapX(0)} ${mapY(0)} L ${mapX(0)} ${mapY(p.f)} `;
      for (let i = 2; i < profile.length; i++) {
        let pt = profile[i];
        if (pt.arc) {
          let sw = pt.sweep !== undefined ? pt.sweep : 0;
          pathD += `A ${pt.r * scale} ${pt.r * scale} 0 0 ${sw} ${mapX(pt.x)} ${mapY(pt.y)} `;
        } else {
          pathD += `L ${mapX(pt.x)} ${mapY(pt.y)} `;
        }
      }
      pathD += `L ${mapX(pipeLength)} ${mapY(p.t)} `;
      
      for (let i = 1; i <= 6; i++) {
        const cy = p.t - (p.t / 6) * i;
        const cx = pipeLength + (i % 2 === 0 ? 0 : 3.2 / scale);
        pathD += `L ${mapX(cx)} ${mapY(cy)} `;
      }
      pathD += `L ${mapX(0)} ${mapY(0)} Z`;

      // 仕様コード
      const fA1 = formatNumber(p.a1), fA2 = formatNumber(p.a2), fA3 = formatNumber(p.a3);
      const fR = formatNumber(p.r), fRj = formatNumber(p.rj);
      let bevelCode = '';
      if (p.shape === 'V') bevelCode = `${fA1}°`;
      else if (p.shape === 'V2') bevelCode = `${fA1}°- ${fRj}R - ${fA2}°`;
      else if (p.shape === 'V3') bevelCode = `${fA1}°- ${fRj}R - ${fA2}°- ${fRj}R - ${fA3}°`;
      else if (p.shape === 'U') bevelCode = `${fR}R - ${fA1}°`;
      else if (p.shape === 'U2') bevelCode = `${fR}R - ${fA1}°- ${fRj}R - ${fA2}°`;

      let markup = `
        <line x1="${mapX(0)}" y1="${mapY(-10)}" x2="${mapX(0)}" y2="${mapY(p.t) - 80}" stroke="#ef4444" stroke-width="1" stroke-dasharray="6 3 1 3" opacity="0.4" />
        <text x="${mapX(0)}" y="${mapY(-14)}" text-anchor="middle" font-size="7" fill="#ef4444" font-weight="bold">ルート面</text>
        <g transform="translate(18, 20)">
          <rect x="0" y="0" width="165" height="56" fill="#fff" stroke="#475569" stroke-width="1" rx="2" opacity="0.9" />
          <text x="82" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#0f172a">配管開先加工図面</text>
          <text x="10" y="27" font-size="7" fill="#64748b" font-weight="bold">形状: ${shapeNames[state.shape]}</text>
          <text x="100" y="27" font-size="7" fill="#64748b" font-weight="bold">t = ${state.t.val}mm</text>
          <text x="10" y="44" font-size="10" fill="#2563eb" font-weight="black" font-family="monospace">Code: ${bevelCode}</text>
        </g>
        <path d="${pathD}" fill="url(#hatch-beveled)" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round" />
      `;

      function renderText(x, y, val, align='bottom', anchor='middle', unit='') {
        const vS = formatNumber(val);
        return `
          <g transform="translate(${x}, ${y})">
            <text x="0" y="${align === 'bottom' ? -4 : (align === 'middle' ? 4 : 12)}" text-anchor="${anchor}" font-size="12" font-family="sans-serif" font-weight="bold" fill="#0f172a">${vS}${unit}</text>
          </g>
        `;
      }

      function renderVerticalDim(sx, sy1, sy2, lineSx1, lineSx2, val, textOffsetX=8) {
        return `
          <g>
            ${lineSx1 !== undefined ? `<line x1="${lineSx1}" y1="${sy1}" x2="${sx - Math.sign(sx - lineSx1) * 6}" y2="${sy1}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2" />` : ''}
            ${lineSx2 !== undefined ? `<line x1="${lineSx2}" y1="${sy2}" x2="${sx - Math.sign(sx - lineSx2) * 6}" y2="${sy2}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2" />` : ''}
            <line x1="${sx}" y1="${sy1 + 2}" x2="${sx}" y2="${sy2 - 2}" stroke="#0f172a" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
            ${renderText(sx + textOffsetX, (sy1 + sy2) / 2, val, 'middle', (textOffsetX < 0 ? 'end' : 'start'))}
          </g>
        `;
      }

      function renderHorizontalDim(sy, sx1, sx2, lineSy1, lineSy2, val, unit='', dir='top') {
        const ext = dir === 'top' ? -4 : 4;
        return `
          <g>
            ${lineSy1 !== undefined ? `<line x1="${sx1}" y1="${lineSy1}" x2="${sx1}" y2="${sy + ext}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2" />` : ''}
            ${lineSy2 !== undefined ? `<line x1="${sx2}" y1="${lineSy2}" x2="${sx2}" y2="${sy + ext}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2" />` : ''}
            <line x1="${sx1 + 2}" y1="${sy}" x2="${sx2 - 2}" y2="${sy}" stroke="#0f172a" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
            ${renderText((sx1 + sx2) / 2, sy, val, 'bottom', 'middle', unit)}
          </g>
        `;
      }

      function renderAngleDim(scx, scy, angleDeg, val, r=65) {
        const radAngle = angleDeg * Math.PI / 180;
        const sx1 = scx; const sy1 = scy - r; 
        const sx2 = scx + r * Math.sin(radAngle); const sy2 = scy - r * Math.cos(radAngle);
        const extY = scy - r - 45; // 補助線を長く延長
        const textDist = r + 15;
        const tx = scx + textDist * Math.sin(radAngle / 2);
        const ty = scy - textDist * Math.cos(radAngle / 2);

        return `
          <g>
            <line x1="${scx}" y1="${scy}" x2="${scx}" y2="${extY}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" />
            <path d="M ${sx1} ${sy1} A ${r} ${r} 0 0 1 ${sx2} ${sy2}" fill="none" stroke="#0f172a" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
            ${renderText(tx, ty + 1, val, 'middle', 'middle', '°')}
          </g>
        `;
      }

      function renderRadiusDim(scx, scy, sax, say, rVal) {
        const mx = scx + (sax - scx) * 0.6; const my = say + (scy - say) * 0.4;
        return `
          <g>
            <line x1="${scx - 4}" y1="${scy}" x2="${scx + 4}" y2="${scy}" stroke="#94a3b8" stroke-width="1" />
            <line x1="${scx}" y1="${scy - 4}" x2="${scx}" y2="${scy + 4}" stroke="#94a3b8" stroke-width="1" />
            <line x1="${scx}" y1="${scy}" x2="${sax}" y2="${say}" stroke="#0f172a" stroke-width="1" marker-end="url(#arrow-end)" />
            ${renderText(mx, my + 4, `R${formatNumber(rVal)}`, 'middle', 'middle')}
          </g>
        `;
      }

      function renderJointRadiusDim(sx, sy, rVal, idx) {
        const dx = 40 + idx * 25;
        const dy = 30 + idx * 25; 
        const px1 = sx; const py1 = sy;
        const px2 = sx + dx; const py2 = sy + dy;
        const px3 = px2 + 30; 
        const mx = (px2 + px3) / 2;
        return `
          <g>
            <path d="M ${px1} ${py1} L ${px2} ${py2} L ${px3} ${py2}" fill="none" stroke="#2563eb" stroke-width="1" marker-start="url(#arrow-start)" />
            ${renderText(mx, py2 - 2, `R${formatNumber(rVal)}`, 'bottom', 'middle')}
          </g>
        `;
      }

      // 寸法線描画
      // 左側 (ルート面 f)
      markup += renderVerticalDim(mapX(0) - 25, mapY(0), mapY(p.f), mapX(0), mapX(0), state.f.val, -14);

      // 右側 (h1, h2, t) - 短いものほど内側に配置
      let hIndex = 0;
      stepsForDim.forEach((step, i) => {
        if (step.h !== undefined) {
          const hStartVal = step.hStart !== undefined ? step.hStart : step.startY;
          markup += renderVerticalDim(mapX(pipeLength) + 25 + hIndex * 22, mapY(hStartVal), mapY(step.endY), mapX(step.endX), mapX(pipeLength), step.h);
          hIndex++;
        }
      });
      // t は一番外側に配置
      markup += renderVerticalDim(mapX(pipeLength) + 25 + hIndex * 22, mapY(0), mapY(p.t), mapX(pipeLength), mapX(pipeLength), state.t.val);

      // 水平寸法
      stepsForDim.forEach((step, i) => {
        const dimY = mapY(p.t) - 24 - i * 26;
        markup += renderHorizontalDim(dimY, mapX(0), mapX(step.endX), mapY(p.f), mapY(step.endY), step.endX, '', 'top');
      });

      // 角度寸法
      stepsForDim.forEach((step, i) => {
        markup += renderAngleDim(mapX(step.startX), mapY(step.startY), step.a, step.a, 65 + i * 30);
      });

      if (['U', 'U2'].includes(state.shape)) {
        markup += renderRadiusDim(
          mapX(p.r), mapY(p.f),
          mapX(p.r - p.r * Math.cos(rad(p.a1)/2)), mapY(p.f + p.r * Math.sin(rad(p.a1)/2)),
          state.r.val
        );
      }

      if (['V2', 'V3', 'U2'].includes(state.shape)) {
        joints.forEach((joint, i) => {
          markup += renderJointRadiusDim(mapX(joint.x), mapY(joint.y), state.rj.val, i);
        });
      }

      svgContent.innerHTML = markup;
    }

    // --- コントロールレンダリング ---
    function renderControls() {
      const limitsList = getLimits(parseFloat(state.t.val), parseFloat(state.f.val), parseFloat(state.h1.val));

      renderGroupHTML('field-t', '配管肉厚 (t)', 't', 'mm', false, limitsList);
      renderGroupHTML('field-f', 'ルート面高さ (f)', 'f', 'mm', true, limitsList);
      renderGroupHTML('field-a1', '第一開先角度 (θ1)', 'a1', '°', true, limitsList);

      const showR = ['U', 'U2'].includes(state.shape);
      const showH1 = ['V2', 'V3', 'U2'].includes(state.shape);
      const showH2 = ['V3'].includes(state.shape);
      const showRj = ['V2', 'V3', 'U2'].includes(state.shape);

      if (showR) { renderGroupHTML('field-r', '底部R半径 (r)', 'r', 'mm', true, limitsList); document.getElementById('field-r').classList.remove('hidden'); } else { document.getElementById('field-r').classList.add('hidden'); }
      if (showH1) { renderGroupHTML('field-h1', '第一段高さ (h1)', 'h1', 'mm', true, limitsList); renderGroupHTML('field-a2', '第二開先角度 (θ2)', 'a2', '°', true, limitsList); document.getElementById('field-h1').classList.remove('hidden'); document.getElementById('field-a2').classList.remove('hidden'); } else { document.getElementById('field-h1').classList.add('hidden'); document.getElementById('field-a2').classList.add('hidden'); }
      if (showH2) { renderGroupHTML('field-h2', '第二段高さ (h2)', 'h2', 'mm', true, limitsList); renderGroupHTML('field-a3', '第三開先角度 (θ3)', 'a3', '°', true, limitsList); document.getElementById('field-h2').classList.remove('hidden'); document.getElementById('field-a3').classList.remove('hidden'); } else { document.getElementById('field-h2').classList.add('hidden'); document.getElementById('field-a3').classList.add('hidden'); }
      if (showRj) { renderGroupHTML('field-rj', '段境界R半径 (Rj)', 'rj', 'mm', true, limitsList); document.getElementById('field-rj').classList.remove('hidden'); } else { document.getElementById('field-rj').classList.add('hidden'); }

      const noAdvancedMsg = document.getElementById('no-advanced-msg');
      if (!showR && !showH1 && !showH2 && !showRj) { noAdvancedMsg.classList.remove('hidden'); } else { noAdvancedMsg.classList.add('hidden'); }
    }

    function renderGroupHTML(elemId, label, name, unit, isTolEnabled, limitsList) {
      const parent = document.getElementById(elemId);
      if (!parent) return;
      const lim = limitsList[name];
      const rawVal = parseFloat(tempState[name].val) || 0;
      const boundedVal = Math.min(Math.max(rawVal, lim.min), lim.max);
      const tpValue = tempState[name].tp || '';
      const tmValue = tempState[name].tm || '';

      const tolHTML = isTolEnabled ? `
        <div class="flex items-center justify-between pt-1.5 border-t border-dashed border-slate-100">
          <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">許容公差</span>
          <div class="flex items-center space-x-2">
            <div class="flex items-center space-x-1 bg-slate-50 px-1.5 py-0.5 border border-slate-200 rounded-md">
              <span class="text-[9px] font-bold text-blue-500">+</span>
              <input type="number" step="0.1" id="num-tol-p-${name}" class="w-9 text-center text-xs font-semibold bg-transparent border-none outline-none" value="${tpValue}" placeholder="0" oninput="updateTol('${name}', 'tp', this.value)" onblur="commitField('${name}')" onkeydown="handleKeyEnter(event)" />
            </div>
            <div class="flex items-center space-x-1 bg-slate-50 px-1.5 py-0.5 border border-slate-200 rounded-md">
              <span class="text-[9px] font-bold text-slate-500">-</span>
              <input type="number" step="0.1" id="num-tol-m-${name}" class="w-9 text-center text-xs font-semibold bg-transparent border-none outline-none" value="${tmValue}" placeholder="0" oninput="updateTol('${name}', 'tm', this.value)" onblur="commitField('${name}')" onkeydown="handleKeyEnter(event)" />
            </div>
          </div>
        </div>
      ` : '';

      parent.innerHTML = `
        <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm space-y-2.5 animate-fade-in">
          <div class="flex justify-between items-center">
            <span class="text-xs font-bold text-slate-700">${label}</span>
            <div class="flex items-center space-x-1">
              <input type="number" step="${lim.step}" min="${lim.min}" max="${lim.max}" id="num-val-${name}" class="w-18 p-1 text-center font-bold text-slate-800 bg-slate-50 border rounded focus:ring-2 focus:ring-blue-500 text-xs outline-none" value="${tempState[name].val}" oninput="updateVal('${name}', this.value)" onblur="commitField('${name}')" onkeydown="handleKeyEnter(event)" />
              <span class="text-xs text-slate-500 font-bold">${unit}</span>
            </div>
          </div>
          <div class="flex items-center space-x-2 py-0.5 select-none" ontouchstart="event.stopPropagation()" ontouchmove="event.stopPropagation()">
            <span class="text-[9px] text-slate-400 w-6 text-right font-semibold">${lim.min}</span>
            <input type="range" min="${lim.min}" max="${lim.max}" step="${lim.step}" id="rng-val-${name}" class="flex-1 h-2.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600 outline-none touch-none" style="touch-action: none;" value="${boundedVal}" oninput="syncSlider('${name}', this.value)" onchange="commitField('${name}')" />
            <span class="text-[9px] text-slate-400 w-8 font-semibold">${formatNumber(lim.max)}</span>
          </div>
          ${tolHTML}
        </div>
      `;
    }

    function updateVal(name, value) { tempState[name].val = value; const rng = document.getElementById(`rng-val-${name}`); if (rng) rng.value = value; }
    function updateTol(name, field, value) { tempState[name][field] = value; }
    function syncSlider(name, value) { tempState[name].val = value; const numInput = document.getElementById(`num-val-${name}`); if (numInput) numInput.value = value; }
    
    function commitField(name) {
      state[name] = JSON.parse(JSON.stringify(tempState[name]));
      normalizeLimits(); draw(); renderControls();
    }
    function handleKeyEnter(e) { if (e.key === 'Enter') e.target.blur(); }

    document.getElementById('btn-reset').addEventListener('click', () => {
      state = JSON.parse(JSON.stringify(initialParams));
      tempState = JSON.parse(JSON.stringify(initialParams));
      changeShape(state.shape);
    });

    window.onload = () => { changeShape(state.shape); };
  </script>
</body>
</html>
